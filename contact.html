        <section class="contact">
    <div class="container">

            </div>

            <div class="form-group">

                <label>Amalni bajaring</label>

                <div class="captcha">

                    <span>7 + 5 =</span>

                    <input type="number" placeholder="Javob">

                </div>

            </div>

            <button type="submit">
                <i class="fa-solid fa-paper-plane"></i>
                Murojaat yuborish
            </button>

        </form>

    </div>
</section>
