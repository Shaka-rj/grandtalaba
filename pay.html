            content="GrandTalaba, OTM, universitet, xususiy OTM, grant, xorijda o'qish, hujjat topshirish, ta'lim" />

        <link rel="preconnect" href="https://fonts.googleapis.com" />

        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
            rel="stylesheet" />

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <section class="payment">

    <div class="container">

        <div class="section-title">
            <h2>GrandTalaba</h2>
            <h2>To'lov</h2>
            <p>Xizmat turini tanlang va xavfsiz to'lovni amalga oshiring.</p>
        </div>

        <form class="payment-form">

            <label>To'lov provayderi</label>

            <div class="providers">

    <label class="provider">
        <input type="radio" name="provider" checked>

        <img src="icons/acharya-universiteti.png" alt="Click">

        <span>Click</span>
    </label>

    <label class="provider">
        <input type="radio" name="provider">

        <img src="icons/al-xorazmiy-universiteti.png" alt="Payme">

        <span>Payme</span>
    </label>

    <label class="provider">
        <input type="radio" name="provider">

        <img src="icons/alfraganus-universiteti.png" alt="Uzum Bank">

        <span>Uzum Bank</span>
    </label>

</div>

            <label>F.I.Sh.</label>

            <input
                type="text"
                name="fullname"
                placeholder="To'liq ismingiz">

            <label>Telefon raqami</label>

            <input
                type="tel"
                id="phone"
                placeholder="+998 (__) ___-__-__">

            <label>To'lov turi</label>

            <select>

                <option>Konsalting xizmati</option>

                <option>Tur agentlik xizmati</option>

            </select>
            
            <label>To'lov summasi</label>

<div class="price-input">

    <input
        type="number"
        id="amount"
        name="amount"
        min="1000"
        step="1000"
        placeholder="Masalan: 500000"
        required>

    <span>so'm</span>

</div>

<small class="hint">
    Minimal to'lov summasi: <strong>1 000 so'm</strong>
</small>

            <button>

                <i class="fa-solid fa-credit-card"></i>

                Davom etish

            </button>

        </form>

    </div>

</section>
        <script>
        const phone=document.getElementById("phone");

phone.addEventListener("input",()=>{

    const value=phone.value.replace(/\D/g,'');

    if(value.length>12){

        phone.value=phone.value.slice(0,-1);

    }

});
        </script>
    </body>
</html>
